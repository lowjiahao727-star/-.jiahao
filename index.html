<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>青竹电竟</title>

<style>
body{
    margin:0;
    background:#f5f5f5;
    font-family:Arial;
}

.header{
    height:55px;
    background:#2196f3;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
    font-weight:bold;
}

.notice{
    background:#fff8e1;
    padding:12px;
}

.banner{
    margin:10px;
    background:#ddd;
    height:150px;
    border-radius:12px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.menu{
    background:#fff;
    margin:10px;
    border-radius:12px;
    padding:20px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    text-align:center;
}

.menu-icon{
    font-size:30px;
}

.menu-text{
    margin-top:8px;
}
</style>
</head>

<body>

<div class="header">
    青竹电竟
</div>

<div class="notice">
    📢 欢迎来到青竹电竟！
</div>

<div class="banner">
    首页横幅图片
</div>

<div class="menu">
    <div>
        <div class="menu-icon">📥</div>
        <div class="menu-text">接单</div>
    </div>

    <div>
        <div class="menu-icon">📋</div>
        <div class="menu-text">订单</div>
    </div>

    <div>
        <div class="menu-icon">👤</div>
        <div class="menu-text">我的</div>
    </div>
</div>

</body>
</html>
